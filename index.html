<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Background Grid</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
</head>
<body>
  <div id="topBar" class="top-bar">
    <button class="topbar-btn hamburger-btn" id="hamburgerBtn" title="Menu" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="top-bar-menus" id="topBarMenus">
    <div class="menu">
      <button class="menu-button" data-menu="file">File</button>
      <div class="menu-dropdown" data-menu="file">
        <button id="actionNew" class="menu-item">New</button>
        <button id="actionOpen" class="menu-item">Open</button>
        <button id="actionSave" class="menu-item">Save</button>
      </div>
    </div>
    <div class="menu">
      <button class="menu-button" data-menu="edit">Edit</button>
      <div class="menu-dropdown" data-menu="edit">
        <button id="actionUndo" class="menu-item">Undo <span class="shortcut-hint">Ctrl+Z</span></button>
        <button id="actionRedo" class="menu-item">Redo <span class="shortcut-hint">Ctrl+Shift+Z</span></button>
      </div>
    </div>
    <div class="menu">
      <button class="menu-button" data-menu="view">View</button>
      <div class="menu-dropdown" data-menu="view">
        <button class="menu-item" disabled>Reset Zoom (soon)</button>
      </div>
    </div>
    <div class="menu">
      <button class="menu-button" data-menu="add">Add</button>
      <div class="menu-dropdown" data-menu="add">
        <button id="actionAddNode" class="menu-item">Add Node</button>
        <button id="actionAddArrow" class="menu-item">Add Arrow</button>
        <div class="menu-separator"></div>
        <button id="actionAddRectangle" class="menu-item">Add Rectangle</button>
        <button id="actionAddCircle" class="menu-item">Add Circle</button>
        <button id="actionAddTriangle" class="menu-item">Add Triangle</button>
        <button id="actionAddDiamond" class="menu-item">Add Diamond</button>
        <div class="menu-separator"></div>
        <button id="actionAddConnector" class="menu-item">Add Connector</button>
        <div class="menu-separator"></div>
        <button id="actionAddImageContainer" class="menu-item">Add Image Container</button>
    </div>
    </div>
    </div>
    <div class="top-bar-actions">
      <button id="mobileUndoBtn" class="topbar-btn mobile-action-btn" title="Undo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button id="mobileRedoBtn" class="topbar-btn mobile-action-btn" title="Redo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button id="mobileOpenBtn" class="topbar-btn mobile-action-btn" title="Open">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <polyline points="9 14 12 11 15 14"/>
        </svg>
      </button>
      <button id="mobileSaveBtn" class="topbar-btn mobile-action-btn" title="Save">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      </button>
      <span id="saveIndicator" class="save-indicator"></span>
      <button id="actionSettings" class="topbar-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="contextMenu" class="context-menu" style="display:none"></div>
  <canvas id="gridCanvas"></canvas>
  <canvas id="arrowCanvas"></canvas>
  <div id="entityLayer"></div>
  <div id="marquee"></div>

  <div class="panel-resize-handle" id="panelResizeHandle"></div>
  <div id="sidePanel" class="side-panel">
    <div class="side-panel-content" id="sidePanelContent">
      <div class="panel-empty">No selection</div>
    </div>
  </div>

  <div id="serveWarning" style="display:none; position:fixed; inset:0; background:#111; color:#fff; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; padding:24px; line-height:1.5;">
    <h2 style="margin:0 0 8px 0; font-weight:600;">This page needs to be served over HTTP</h2>
    <p style="margin:0 0 12px 0;">You're opening the file directly from disk. ES module imports are blocked on the <code>file://</code> protocol, so nothing runs.</p>
    <p style="margin:0;">Run a local server in this folder and visit <a href="http://localhost:5173" style="color:#4FC3F7;">http://localhost:5173</a>. For example:</p>
    <pre style="background:#222; padding:12px; border-radius:6px; margin-top:8px;">python serve.py --port 5173</pre>
  </div>

  <script>
    (function() {
      if (location.protocol === 'file:') {
        document.getElementById('serveWarning').style.display = 'block';
      }
    })();
  </script>
