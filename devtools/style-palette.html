<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Style Palette — CanvasWebTool</title>
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
    --border: #2a2a2a; --text: #ccc; --text-dim: #777;
    --accent: #6bb5ff; --accent-dim: #3a7cc3; --warn: #f0c800;
    --success: #4caf84; --radius: 6px;
    --font: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 10px; flex-shrink: 0; }
  header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .header-actions { display: flex; gap: 6px; }
  .btn { padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; transition: background .15s; }
  .btn:hover { background: #2e2e2e; }
  .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent); }
  .btn.success { background: #2a5a40; border-color: var(--success); color: #fff; }
  .btn.success:hover { background: #3a7a55; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }

  /* Main layout */
  #main { display: flex; flex: 1; overflow: hidden; }
  #panel-left { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #preview { flex: 1; background: #000; position: relative; min-width: 0; }
  #preview iframe { width: 100%; height: 100%; border: none; }
  #preview-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 13px; pointer-events: none; }
  #panel-right { width: 340px; min-width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  /* Left panel - file list + categories */
  .panel-section { padding: 8px 0; }
  .panel-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); padding: 6px 12px; }
  .file-item { display: flex; align-items: center; gap: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; border: none; background: none; color: var(--text); width: 100%; text-align: left; font: inherit; transition: background .1s; }
  .file-item:hover { background: var(--surface2); }
  .file-item.active { background: var(--accent-dim); color: #fff; }
  .file-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .file-list { overflow-y: auto; flex-shrink: 0; }
  .cat-list { overflow-y: auto; flex: 1; }
  .cat-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); font: inherit; font-size: 12px; padding: 5px 12px; cursor: pointer; transition: background .1s; }
  .cat-btn:hover { background: var(--surface2); }
  .cat-btn.active { background: var(--accent-dim); color: #fff; }
  .cat-badge { float: right; font-size: 10px; background: var(--surface2); color: var(--text-dim); border-radius: 9px; padding: 0px 6px; }
  .cat-btn.active .cat-badge { background: rgba(255,255,255,.15); color: #fff; }

  /* Right panel - token cards */
  #token-scroll { flex: 1; overflow-y: auto; padding: 10px; }
  .token-group-title { font-size: 13px; font-weight: 600; color: var(--text-dim); padding: 12px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .token-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px; transition: border-color .15s; }
  .token-card:hover { border-color: #444; }
  .token-card.modified { border-color: var(--accent-dim); }
  .token-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }
  .token-source { font-size: 10px; color: #555; font-family: Consolas,monospace; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .token-controls { display: flex; align-items: center; gap: 6px; }
  .color-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #444; flex-shrink: 0; position: relative; cursor: pointer; }
  .color-swatch input[type=color] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .token-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: Consolas,monospace; font-size: 12px; padding: 4px 6px; outline: none; min-width: 0; }
  .token-input:focus { border-color: var(--accent); }
  .token-input.modified { border-color: var(--accent-dim); background: #141e28; }
  .token-num { width: 62px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: Consolas,monospace; font-size: 12px; padding: 4px 6px; outline: none; }
  .token-num:focus { border-color: var(--accent); }
  .token-num.modified { border-color: var(--accent-dim); background: #141e28; }
  .token-unit { font-size: 10px; color: var(--text-dim); font-weight: 600; min-width: 18px; }
  .token-reset { font-size: 10px; padding: 2px 6px; border-radius: 3px; border: 1px solid transparent; background: none; color: var(--text-dim); cursor: pointer; font: inherit; }
  .token-reset:hover { border-color: #444; color: var(--text); }
  .token-reset.hidden { visibility: hidden; }
  .token-note { font-size: 10px; color: var(--warn); margin-top: 2px; }

  /* Status bar */
  #status { padding: 5px 12px; font-size: 11px; color: var(--text-dim); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #status .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
  #status .dot.loaded { background: var(--success); }
  #status .dot.dirty { background: var(--warn); }
  .status-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 18px; font-size: 12px; color: var(--text); box-shadow: 0 4px 16px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 1000; }
  #toast.show { opacity: 1; }
  #toast.error { border-color: #e05555; }
  #toast.success { border-color: var(--success); }
</style>
</head>
<body>

<header>
  <h1>Style Palette</h1>
  <div class="header-actions">
    <button class="btn primary" id="btnLoad" title="Load all source files">&#8635; Load</button>
    <button class="btn" id="btnRefresh" disabled title="Force-rebuild preview">&#8634; Refresh Preview</button>
    <button class="btn success" id="btnApply" disabled title="Write changes to disk">&#10003; Apply &amp; Write</button>
    <button class="btn" id="btnDownload" disabled title="Download modified files">&#8615; Download</button>
  </div>
</header>

<div id="main">
  <!-- LEFT: files + categories -->
  <div id="panel-left">
    <div class="panel-section file-list">
      <h3>HTML Pages</h3>
      <div id="fileList"></div>
    </div>
    <div class="panel-section cat-list">
      <h3>Style Variables</h3>
      <div id="categoryNav"></div>
    </div>
  </div>

  <!-- CENTER: preview -->
  <div id="preview">
    <div id="preview-overlay">Click <b>Load</b> to see preview</div>
  </div>

  <!-- RIGHT: token editor -->
  <div id="panel-right">
    <div id="token-scroll">
      <div id="emptyState" style="padding:40px;text-align:center;color:#555;">
        <p style="font-size:14px;margin-bottom:6px;">No styles loaded</p>
        <p style="font-size:12px;">Click <b>Load</b> to scan source files.</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="status">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">Not loaded</span>
  <span class="status-right"><span id="modifiedCount" style="color:var(--warn);display:none;">0 changes</span></span>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const HTML_FILES = [{ key: 'index', path: '../index.html' }];
const JS_FILES = [
  { key: 'gridControl',  path: '../gridScripts/gridControl.js',  dir: 'gridScripts' },
  { key: 'gridDraw',     path: '../gridScripts/gridDraw.js',     dir: 'gridScripts' },
  { key: 'gridSettings', path: '../gridScripts/gridSettings.js', dir: 'gridScripts' },
  { key: 'undoManager',  path: '../gridScripts/undoManager.js',  dir: 'gridScripts' },
  { key: 'documentFormat',path:'../gridScripts/documentFormat.js',dir:'gridScripts'},
  { key: 'fileIO',       path: '../gridScripts/fileIO.js',       dir: 'gridScripts' },
];
const CSS_FILE = '../style.css';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const tokens = [];
let catOrder = [];
let rawFiles = {};         // { style, index, gridControl, gridDraw, ... }
let blobUrls = {};         // js file key -> blob URL
let previewBlobUrl = null;
let dirHandle = null;
let previewDebounce = null;
let activeCat = null;

// ═══════════════════════════════════════════
// CSS PARSER (same logic as before)
// ═══════════════════════════════════════════
function parseCSS(text) {
  const results = [];
  const clean = text.replace(/\/\*[\s\S]*?\*\//g, '');
  const blocks = clean.split('}');
  for (let i = 0; i < blocks.length; i++) {
    const block = blocks[i].trim();
    if (!block) continue;
    const braceIdx = block.lastIndexOf('{');
    if (braceIdx === -1) continue;
    const selector = block.substring(0, braceIdx).trim().replace(/\s+/g, ' ');
    const body = block.substring(braceIdx + 1).trim();
    if (!selector || !body) continue;
    const declarations = body.split(';');
    for (const decl of declarations) {
      const colonIdx = decl.indexOf(':');
      if (colonIdx === -1) continue;
      const prop = decl.substring(0, colonIdx).trim();
      const val = decl.substring(colonIdx + 1).trim();
      if (!prop || !val) continue;
      results.push({ selector, property: prop, value: val, cssIndex: i });
    }
  }
  return results;
}

function classify(prop, val) {
  const vl = val.toLowerCase();
  if (prop === 'font-family' || prop === 'font-weight' || prop === 'font-style' ||
      prop === 'line-height' || prop === 'letter-spacing' || prop === 'text-transform') return 'typography';
  if (prop.startsWith('border-radius')) return 'radius';
  if (prop === 'box-shadow' || prop === 'text-shadow') return 'shadow';
  if (prop === 'opacity') return 'opacity';
  if (prop === 'border-width' || prop === 'border-top-width' || prop === 'border-right-width' ||
      prop === 'border-bottom-width' || prop === 'border-left-width' || prop === 'outline-width') return 'border';
  const colorMatch = vl.match(/#[0-9a-f]{3,8}|rgb\(|rgba\(|hsl\(/);
  const isColorProp = prop === 'color' || prop === 'background' || prop === 'background-color' ||
      prop === 'border-color' || prop === 'caret-color' || prop === 'fill' || prop === 'stroke' ||
      prop === 'outline-color' || prop.endsWith('-color');
  if (isColorProp && colorMatch) return 'color';
  if (prop === 'font-size') return 'font-size';
  if (/^(width|height|min-width|max-width|min-height|max-height|padding|margin|gap|top|right|bottom|left|border-spacing|outline-offset|inset)$/.test(prop)) return 'size';
  return null;
}

function assignCat(selector) {
  const s = selector.toLowerCase();
  if (s.includes('body') || s.includes('html') || (s.includes('canvas') && !s.includes('grid'))) return 'Page & Canvas';
  if (s.includes('top-bar') || s.includes('menu-button')) return 'Top Bar';
  if (s.includes('side-panel') || s.includes('panel-')) return 'Side Panel';
  if (s.includes('menu-dropdown') || s.includes('menu-item') || s.includes('menu.open') || s.includes('menu:hover')) return 'Menus & Dropdowns';
  if (s.includes('context-menu') || s.includes('context-item') || s.includes('context-submenu')) return 'Context Menus';
  if (s.includes('inline-editor') || s.includes('shortcut-hint')) return 'Inline Editors';
  return 'Other CSS';
}

function normalizeColor(val) {
  if (!val) return val;
  if (/^#[0-9a-fA-F]{6}$/.test(val.trim())) return val.trim();
  if (/^#[0-9a-fA-F]{3}$/.test(val.trim())) { const h=val.trim(); return `#${h[1]}${h[1]}${h[2]}${h[2]}${h[3]}${h[3]}`; }
  const m = val.trim().match(/^rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/);
  if (m) return '#'+[m[1],m[2],m[3]].map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
  return val.trim();
}

function safeId(s) { return s.replace(/[^a-zA-Z0-9-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }

// ═══════════════════════════════════════════
// JS TOKEN DEFINITIONS
// ═══════════════════════════════════════════
function extractJSTokens(fileKey) {
  const r = [];
  if (fileKey === 'gridControl') {
    r.push({source:'gridControl.js', cat:'Nodes', label:'Default Node Color', type:'color', prop:'color', orig:'#2b2b2b', find:"color: '#2b2b2b'", repl:v=>`color: '${v}'`});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Default Title Color', type:'color', prop:'titleColor', orig:'#e7e7e7', find:"titleColor: '#e7e7e7'", repl:v=>`titleColor: '${v}'`});
    r.push({source:'gridControl.js', cat:'Connections', label:'Default Connection Color', type:'color', prop:'color', orig:'#6bb5ff', find:"color: '#6bb5ff'", repl:v=>`color: '${v}'`});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Selection Outline Color', type:'color', prop:'strokeStyle', orig:'#f0c800', find:"ctx.strokeStyle = '#f0c800'", repl:v=>`ctx.strokeStyle = '${v}'`});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Node Text Color', type:'color', prop:'fillStyle', orig:'#ddd', find:"ctx.fillStyle = '#ddd'", repl:v=>`ctx.fillStyle = '${v}'`});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Marquee Stroke Color', type:'color', prop:'strokeStyle', orig:'#5aa0ff', find:"ctx.strokeStyle = 'rgba(90,160,255,0.9)'", repl:v=>{const a=parseInt(v.slice(1,3),16),b=parseInt(v.slice(3,5),16),c=parseInt(v.slice(5,7),16);return`ctx.strokeStyle = 'rgba(${a},${b},${c},0.9)'`;}});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Marquee Fill Color', type:'color', prop:'fillStyle', orig:'#5aa0ff', find:"ctx.fillStyle = 'rgba(90,160,255,0.15)'", repl:v=>{const a=parseInt(v.slice(1,3),16),b=parseInt(v.slice(3,5),16),c=parseInt(v.slice(5,7),16);return`ctx.fillStyle = 'rgba(${a},${b},${c},0.15)'`;}});
    r.push({source:'gridControl.js', cat:'Connections', label:'Connection Label Text', type:'color', prop:'fillStyle', orig:'#fff', find:"ctx.fillStyle = '#fff'", repl:v=>`ctx.fillStyle = '${v}'`});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Drag Label Background', type:'color', prop:'background', orig:'#000000', find:"el.style.background = 'rgba(0,0,0,0.85)'", repl:v=>{const a=parseInt(v.slice(1,3),16),b=parseInt(v.slice(3,5),16),c=parseInt(v.slice(5,7),16);return`el.style.background = 'rgba(${a},${b},${c},0.85)'`;}});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Drag Label Text', type:'color', prop:'color', orig:'#fff', find:"el.style.color = '#fff'", repl:v=>`el.style.color = '${v}'`});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Drag Label Border', type:'color', prop:'border', orig:'#f0c800', find:"el.style.border = '1px solid #f0c800'", repl:v=>`el.style.border = '1px solid ${v}'`});
    r.push({source:'gridControl.js', cat:'Connections', label:'Dangling Connection Color', type:'color', prop:'strokeStyle', orig:'#6bb5ff', find:"ctx.strokeStyle = 'rgba(107, 181, 255, 0.5)'", repl:v=>{const a=parseInt(v.slice(1,3),16),b=parseInt(v.slice(3,5),16),c=parseInt(v.slice(5,7),16);return`ctx.strokeStyle = 'rgba(${a}, ${b}, ${c}, 0.5)'`;}});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Header Darken Factor', type:'number', prop:'darkenFactor', orig:'0.6', find:'getDarkerColor(baseColor, 0.6)', repl:v=>`getDarkerColor(baseColor, ${v})`, replAll:true});
    r.push({source:'gridControl.js', cat:'Nodes', label:'Border Darken Factor', type:'number', prop:'darkenFactor', orig:'0.7', find:'getDarkerColor(baseColor, 0.7)', repl:v=>`getDarkerColor(baseColor, ${v})`});
  }
  if (fileKey === 'gridSettings') {
    r.push({source:'gridSettings.js', cat:'Grid', label:'Grid Background Color', type:'color', prop:'backgroundColor', orig:'#181818', find:"backgroundColor: 'rgb(24, 24, 24)'", repl:v=>`backgroundColor: '${v}'`});
    r.push({source:'gridSettings.js', cat:'Grid', label:'Grid Line Color', type:'color', prop:'lineColor', orig:'#1e1e1e', find:'lineColor: [30, 30, 30]', repl:v=>{const h=v.replace('#','');return`lineColor: [${parseInt(h.substring(0,2),16)}, ${parseInt(h.substring(2,4),16)}, ${parseInt(h.substring(4,6),16)}]`;}});
    r.push({source:'gridSettings.js', cat:'Grid', label:'Grid Line Width', type:'number', prop:'lineWidth', orig:'2', find:'lineWidth: 2', repl:v=>`lineWidth: ${v}`});
    r.push({source:'gridSettings.js', cat:'Grid', label:'Grid Base Spacing', type:'number', prop:'spacing', orig:'20', find:'spacing: 20', repl:v=>`spacing: ${v}`});
  }
  return r;
}

// ═══════════════════════════════════════════
// TOKEN MANAGEMENT
// ═══════════════════════════════════════════
function addToken(cat, label, sel, prop, val, type, src, meta) {
  const id = 't' + tokens.length;
  tokens.push({id, cat, label, selector:sel||'', property:prop, value:val, originalValue:val, type, source:src, metadata:meta||{}, modified:false});
  if (!catOrder.includes(cat)) catOrder.push(cat);
}

function getModified() { return tokens.filter(t=>t.modified); }

// ═══════════════════════════════════════════
// FILE LOADING
// ═══════════════════════════════════════════
async function loadAll() {
  const btn = document.getElementById('btnLoad');
  btn.disabled = true; btn.textContent = 'Loading...';

  rawFiles = {}; tokens.length = 0; catOrder.length = 0;
  Object.values(blobUrls).forEach(u => URL.revokeObjectURL(u));
  blobUrls = {};
  if (previewBlobUrl) { URL.revokeObjectURL(previewBlobUrl); previewBlobUrl = null; }

  try {
    // Load CSS
    const cssRes = await fetch(CSS_FILE);
    if (cssRes.ok) rawFiles.style = await cssRes.text();

    // Load HTML files
    for (const hf of HTML_FILES) {
      const res = await fetch(hf.path);
      if (res.ok) rawFiles[hf.key] = await res.text();
    }

    // Load JS files
    for (const jsf of JS_FILES) {
      const res = await fetch(jsf.path);
      if (res.ok) rawFiles[jsf.key] = await res.text();
    }

    // Parse CSS -> tokens
    if (rawFiles.style) {
      const decls = parseCSS(rawFiles.style);
      for (const d of decls) {
        const pt = classify(d.property, d.value);
        if (!pt) continue;
        const cat = assignCat(d.selector);
        let displayType = pt;
        if (displayType === 'radius' || displayType === 'font-size' || displayType === 'border') displayType = 'size';
        let val = d.value;
        if (pt === 'color') { const n = normalizeColor(val); if (n) val = n; }
        const selShort = d.selector.length > 45 ? d.selector.substring(0,42)+'...' : d.selector;
        addToken(cat, formatLabel(d.property), selShort, d.property, val, displayType, 'style.css', {cssOrig: d.value});
      }
    }

    // Parse JS -> tokens
    for (const jsf of JS_FILES) {
      const jt = extractJSTokens(jsf.key);
      for (const t of jt) {
        addToken(t.cat, t.label, t.source, t.prop, t.orig, t.type, t.source, {find:t.find, repl:t.repl, replAll:t.replAll});
      }
    }

    // Dedup CSS tokens
    const seen = new Set();
    const deduped = [];
    for (const t of tokens) {
      const k = `${t.selector}::${t.property}`;
      if (t.metadata.find) { deduped.push(t); continue; }
      if (!seen.has(k)) { seen.add(k); deduped.push(t); }
    }
    tokens.length = 0; tokens.push(...deduped);
    catOrder = [...new Set(deduped.map(t=>t.cat))];

    // Build initial preview
    await buildPreview();

    renderAll();
    document.getElementById('btnApply').disabled = false;
    document.getElementById('btnDownload').disabled = false;
    document.getElementById('btnRefresh').disabled = false;
    document.getElementById('statusDot').className = 'dot loaded';
    document.getElementById('statusText').textContent = `${Object.keys(rawFiles).length} files · ${tokens.length} tokens`;
    toast('Loaded — preview is live', 'success');
  } catch(e) {
    toast('Load failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '\u21BB Load';
  }
}

function formatLabel(p) {
  return p.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).replace(/^(\w)/,c=>c.toUpperCase());
}

// ═══════════════════════════════════════════
// BUILD MODIFIED FILES (in-memory)
// ═══════════════════════════════════════════
function buildModifiedCSS() {
  let css = rawFiles.style || '';
  for (const t of tokens) {
    if (!t.modified || t.source !== 'style.css') continue;
    const origVal = t.metadata.cssOrig || t.originalValue;
    const escProp = t.property.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const escVal = origVal.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    css = css.replace(new RegExp('('+escProp+'\\s*:\\s*)'+escVal+'(?=\\s*[;}])','g'), (_,pre)=>pre+t.value);
  }
  return css;
}

function buildModifiedJS(fileKey) {
  let content = rawFiles[fileKey] || '';
  const sourceMap = { gridControl: 'gridControl.js', gridSettings: 'gridSettings.js' };
  const srcName = sourceMap[fileKey];
  if (!srcName) return content; // no tokens defined for this file
  const jsTokens = tokens.filter(t => t.source === srcName && t.modified);
  for (const t of jsTokens) {
    const {find, repl, replAll} = t.metadata;
    if (!find || !repl) continue;
    const replacement = typeof repl === 'function' ? repl(t.value) : t.value;
    if (replAll) {
      content = content.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'), replacement);
    } else {
      content = content.replace(find, replacement);
    }
  }
  return content;
}

async function buildPreview() {
  const iframe = document.querySelector('#preview iframe');
  const overlay = document.getElementById('preview-overlay');

  if (!rawFiles.index) { if (overlay) overlay.style.display = 'flex'; return; }

  let html = rawFiles.index;
  const modifiedCSS = buildModifiedCSS();

  // Inline CSS
  html = html.replace(/<link[^>]+href="style\.css"[^>]*>/i, '');
  html = html.replace(/<\/head>/, `<style>/* palette-modified */\n${modifiedCSS}\n</style>\n</head>`);

  // Build JS blob URLs with rewritten imports
  for (const jsf of JS_FILES) {
    let content = buildModifiedJS(jsf.key);
    // Rewrite relative imports to absolute
    content = content.replace(/from\s+['"]\.\/([^'"]+)['"]/g, (_, p) => `from '/${jsf.dir}/${p}'`);
    const blob = new Blob([content], { type: 'application/javascript' });
    if (blobUrls[jsf.key]) URL.revokeObjectURL(blobUrls[jsf.key]);
    blobUrls[jsf.key] = URL.createObjectURL(blob);
  }

  // Build import map
  const importMap = {};
  for (const jsf of JS_FILES) {
    importMap['/' + jsf.dir + '/' + jsf.key + '.js'] = blobUrls[jsf.key];
  }

  // Insert import map before first script
  const mapScript = `<script type="importmap">\n${JSON.stringify({imports:importMap},null,2)}\n<` + `/script>`;
  html = html.replace(/<script/, mapScript + '\n<script');

  // Create preview blob
  if (previewBlobUrl) URL.revokeObjectURL(previewBlobUrl);
  const previewBlob = new Blob([html], { type: 'text/html' });
  previewBlobUrl = URL.createObjectURL(previewBlob);

  // Remove old iframe, create new one
  if (iframe) iframe.remove();
  const newIframe = document.createElement('iframe');
  newIframe.src = previewBlobUrl;
  newIframe.title = 'Live Preview';
  document.getElementById('preview').appendChild(newIframe);
  if (overlay) overlay.style.display = 'none';
}

function schedulePreview() {
  if (previewDebounce) clearTimeout(previewDebounce);
  previewDebounce = setTimeout(() => {
    buildPreview().then(() => updateStatus());
    previewDebounce = null;
  }, 400);
}

// ═══════════════════════════════════════════
// RENDER UI
// ═══════════════════════════════════════════
function renderAll() {
  const empty = document.getElementById('emptyState');

  // File list
  const fl = document.getElementById('fileList');
  fl.innerHTML = '';
  for (const hf of HTML_FILES) {
    const btn = document.createElement('button');
    btn.className = 'file-item active';
    btn.innerHTML = `<span class="dot"></span> ${hf.key}.html`;
    fl.appendChild(btn);
  }

  // Category nav
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = '';
  for (const cat of catOrder) {
    const count = tokens.filter(t=>t.cat===cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = safeId(cat);
    btn.innerHTML = `${cat} <span class="cat-badge">${count}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = cat;
      renderTokens();
    });
    nav.appendChild(btn);
  }

  // Token cards
  const firstCat = catOrder[0];
  if (firstCat) { activeCat = firstCat; renderTokens(); }
  else if (empty) { empty.style.display = 'block'; }

  // Click first cat
  if (firstCat) {
    const firstBtn = nav.querySelector('.cat-btn');
    if (firstBtn) firstBtn.click();
  }

  updateStatus();
}

function renderTokens() {
  const scroll = document.getElementById('token-scroll');
  const empty = document.getElementById('emptyState');
  scroll.innerHTML = '';

  if (!activeCat) { if (empty) { empty.style.display = 'block'; scroll.appendChild(empty); } return; }
  if (empty) empty.style.display = 'none';

  const catTokens = tokens.filter(t => t.cat === activeCat);
  if (catTokens.length === 0) {
    scroll.innerHTML = '<div style="padding:20px;color:#555;text-align:center;">No variables in this category</div>';
    return;
  }

  for (const token of catTokens) {
    scroll.appendChild(createCard(token));
  }
}

function createCard(token) {
  const card = document.createElement('div');
  card.className = 'token-card';
  card.id = token.id;

  const label = document.createElement('div');
  label.className = 'token-label';
  label.textContent = token.label;
  card.appendChild(label);

  const src = document.createElement('div');
  src.className = 'token-source';
  src.textContent = `${token.selector} ▸ ${token.property}`;
  src.title = `${token.source} :: ${token.selector}`;
  card.appendChild(src);

  const controls = document.createElement('div');
  controls.className = 'token-controls';

  const resetBtn = document.createElement('button');
  resetBtn.className = 'token-reset hidden';
  resetBtn.textContent = '\u21BA';
  resetBtn.title = 'Reset';

  if (token.type === 'color') {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch';
    swatch.style.backgroundColor = token.value;
    const picker = document.createElement('input');
    picker.type = 'color'; picker.value = token.value; picker.title = 'Pick';

    const input = document.createElement('input');
    input.className = 'token-input'; input.type = 'text'; input.value = token.value; input.spellcheck = false;

    function update(v) {
      token.value = v; token.modified = v !== token.originalValue;
      input.value = v; picker.value = v; swatch.style.backgroundColor = v;
      input.className = 'token-input' + (token.modified?' modified':'');
      card.classList.toggle('modified', token.modified);
      resetBtn.classList.toggle('hidden', !token.modified);
      schedulePreview();
    }

    picker.addEventListener('input', () => update(picker.value));
    input.addEventListener('input', () => { const v=input.value.trim(); picker.value=v; swatch.style.backgroundColor=v; token.value=v; token.modified=v!==token.originalValue; input.className='token-input'+(token.modified?' modified':''); card.classList.toggle('modified',token.modified); resetBtn.classList.toggle('hidden',!token.modified); });
    input.addEventListener('blur', () => { if (!/^#[0-9a-fA-F]{6}$/.test(token.value)) { const n=normalizeColor(token.value); if(n) update(n); } else schedulePreview(); });
    input.addEventListener('change', () => schedulePreview());
    resetBtn.addEventListener('click', () => update(token.originalValue));

    swatch.appendChild(picker);
    controls.appendChild(swatch);
    controls.appendChild(input);
    controls.appendChild(resetBtn);
  } else if (token.type === 'number') {
    const num = document.createElement('input');
    num.className = 'token-num'; num.type = 'number'; num.step = '0.05'; num.value = parseFloat(token.value)||0;
    const unitSpan = document.createElement('span');
    unitSpan.className = 'token-unit'; unitSpan.textContent = '';

    function updateNum(v) {
      token.value = String(v); token.modified = token.value !== token.originalValue;
      num.className = 'token-num' + (token.modified ? ' modified' : '');
      card.classList.toggle('modified', token.modified);
      resetBtn.classList.toggle('hidden', !token.modified);
      schedulePreview();
    }
    num.addEventListener('input', () => updateNum(num.value));
    resetBtn.addEventListener('click', () => { num.value = parseFloat(token.originalValue)||0; updateNum(num.value); });
    controls.appendChild(num);
    controls.appendChild(unitSpan);
    controls.appendChild(resetBtn);
  } else {
    const input = document.createElement('input');
    input.className = 'token-input'; input.type = 'text'; input.value = token.value; input.spellcheck = false;
    function updateText(v) { token.value=v; token.modified=v!==token.originalValue; input.className='token-input'+(token.modified?' modified':''); card.classList.toggle('modified',token.modified); resetBtn.classList.toggle('hidden',!token.modified); schedulePreview(); }
    input.addEventListener('input', () => updateText(input.value));
    resetBtn.addEventListener('click', () => { input.value=token.originalValue; updateText(token.originalValue); });
    controls.appendChild(input);
    controls.appendChild(resetBtn);
  }

  card.appendChild(controls);
  return card;
}

function updateStatus() {
  const mod = getModified().length;
  const mc = document.getElementById('modifiedCount');
  if (mod > 0) {
    mc.style.display = ''; mc.textContent = mod + ' change' + (mod!==1?'s':'');
    document.getElementById('statusDot').className = 'dot dirty';
  } else {
    mc.style.display = 'none';
    document.getElementById('statusDot').className = 'dot loaded';
  }
}

// ═══════════════════════════════════════════
// APPLY & DOWNLOAD
// ═══════════════════════════════════════════
function buildFinalCSS() { return buildModifiedCSS(); }
function buildFinalJS(fileKey) { return buildModifiedJS(fileKey); }

async function applyChanges() {
  const mod = getModified();
  if (mod.length === 0) { toast('No changes', 'error'); return; }

  if (!window.showDirectoryPicker) { toast('FS Access API unavailable — use Download', 'error'); return; }

  const btn = document.getElementById('btnApply');
  btn.disabled = true; btn.textContent = 'Writing...';

  try {
    if (!dirHandle) {
      toast('Select the project root folder...', '');
      dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    }

    const writes = [
      { name: 'style.css', content: buildFinalCSS(), path: 'style.css' },
      { name: 'gridControl.js', content: buildFinalJS('gridControl'), path: 'gridScripts/gridControl.js' },
      { name: 'gridSettings.js', content: buildFinalJS('gridSettings'), path: 'gridScripts/gridSettings.js' },
    ];

    for (const w of writes) {
      if (!w.content) continue;
      const parts = w.path.split('/');
      let cur = dirHandle;
      for (let i = 0; i < parts.length - 1; i++) {
        try { cur = await cur.getDirectoryHandle(parts[i]); } catch { cur = await cur.getDirectoryHandle(parts[i], {create:true}); }
      }
      const fh = await cur.getFileHandle(parts[parts.length-1], {create:true});
      const wr = await fh.createWritable();
      await wr.write(w.content);
      await wr.close();
    }

    for (const t of mod) { t.originalValue = t.value; t.modified = false; }
    toast('Files written! Reloading...', 'success');
    setTimeout(() => { dirHandle = null; loadAll(); }, 400);
  } catch(e) {
    if (e.name !== 'AbortError') toast('Write error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '\u2713 Apply & Write';
  }
}

async function downloadFiles() {
  const files = [
    { name: 'style.css', content: buildFinalCSS() || '' },
    { name: 'gridControl.js', content: buildFinalJS('gridControl') || '' },
    { name: 'gridSettings.js', content: buildFinalJS('gridSettings') || '' },
  ];
  for (const f of files) {
    if (!f.content) continue;
    const blob = new Blob([f.content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = f.name; a.click();
    URL.revokeObjectURL(url);
    await new Promise(r=>setTimeout(r,200));
  }
  toast('Files downloaded', 'success');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type||''; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btnLoad').addEventListener('click', loadAll);
  document.getElementById('btnApply').addEventListener('click', applyChanges);
  document.getElementById('btnDownload').addEventListener('click', downloadFiles);
  document.getElementById('btnRefresh').addEventListener('click', () => {
    buildPreview().then(() => toast('Preview refreshed', 'success'));
  });
});
</script>
